---
- name: download gcloud {{ gcloud_version }} archive
  get_url:
    url: "https://dl.google.com/dl/cloudsdk/channels/rapid/downloads/{{ gcloud_pkg[ansible_facts['architecture']] }}"
    checksum: "{{ gcloud_checksums[ansible_facts['architecture']][ansible_facts['system']] }}"
    dest: /tmp/{{ gcloud_pkg[ansible_facts['architecture']] }}
    timeout: 600

#- name: remove gcloud archive directory
#  file: path=/{{ gcloud_install_path }}/google-cloud-sdk state=absent
#  become: no

- name: unpack gcloud {{ gcloud_version }} archive
  unarchive:
    src: /tmp/{{ gcloud_pkg[ansible_facts['architecture']] }}
    dest: "{{ ansible_facts['env']['HOME'] }}"
    copy: no
  become: no

- name: install gcloud
  shell: "{{ gcloud_install_path }}/google-cloud-sdk/install.sh --quiet"
  environment:
    PATH: "{{ gcloud_install_path }}/google-cloud-sdk/bin:{{ ansible_facts['env']['PATH'] }}"
    CLOUDSDK_PYTHON: /usr/bin/python3
  become: no

- name: remove gcloud archive
  file:
    path: /tmp/{{ gcloud_pkg[ansible_facts['architecture']] }}
    state: absent
  become: no
